apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Staging environment: moderate replicas, production-like config
patches:
  - target:
      kind: Rollout
      name: retail-store-ui
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Rollout
      name: retail-store-catalog
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Ingress
      name: retail-store-ui
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: ui.staging.retail-store.example.com
