name: Promote Environment

on:
  workflow_dispatch:
    inputs:
      source_environment:
        description: "Source environment to promote from"
        required: true
        type: choice
        options:
          - dev
          - staging
      target_environment:
        description: "Target environment to promote to"
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: write
  pull-requests: write

env:
  SERVICES: "ui catalog cart orders checkout"
  IMAGE_PREFIX: "public.ecr.aws/aws-containers/retail-store-sample-"

jobs:
  check-health-and-promote:
    runs-on: ubuntu-latest
    steps:
      - name: Validate promotion path
        run: |
          SOURCE="${{ inputs.source_environment }}"
          TARGET="${{ inputs.target_environment }}"

          if [ "$SOURCE" = "$TARGET" ]; then
            echo "::error::Source and target environments must be different."
            exit 1
          fi

          # Validate promotion direction: dev→staging, staging→production
          if [ "$SOURCE" = "dev" ] && [ "$TARGET" != "staging" ]; then
            echo "::error::Dev can only promote to staging. Got target: $TARGET"
            exit 1
          fi

          if [ "$SOURCE" = "staging" ] && [ "$TARGET" != "production" ]; then
            echo "::error::Staging can only promote to production. Got target: $TARGET"
            exit 1
          fi

          echo "Promotion path validated: $SOURCE → $TARGET"

      - name: Check Argo CD health status of source environment
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          SOURCE="${{ inputs.source_environment }}"
          echo "Checking Argo CD health status for all Retail Store apps in '${SOURCE}'..."

          UNHEALTHY_APPS=""
          for SERVICE in ${{ env.SERVICES }}; do
            APP_NAME="retail-store-${SOURCE}-${SERVICE}"

            # Query Argo CD API for application health
            HEALTH_STATUS=$(curl -s -k \
              -H "Authorization: Bearer ${ARGOCD_AUTH_TOKEN}" \
              "${ARGOCD_SERVER}/api/v1/applications/${APP_NAME}" \
              | jq -r '.status.health.status // "Unknown"')

            echo "  ${APP_NAME}: ${HEALTH_STATUS}"

            if [ "$HEALTH_STATUS" != "Healthy" ]; then
              UNHEALTHY_APPS="${UNHEALTHY_APPS}  - ${APP_NAME}: ${HEALTH_STATUS}\n"
            fi
          done

          if [ -n "$UNHEALTHY_APPS" ]; then
            echo "::error::Promotion blocked. The following apps in '${SOURCE}' are not Healthy:"
            echo -e "$UNHEALTHY_APPS"
            echo ""
            echo "All applications in the source environment must be Healthy before promotion."
            exit 1
          fi

          echo "All Retail Store apps in '${SOURCE}' are Healthy. Proceeding with promotion."

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read source environment image tags
        id: read-tags
        run: |
          SOURCE="${{ inputs.source_environment }}"
          TAGS_FILE="overlays/${SOURCE}/patches/image-tags.yaml"

          echo "Reading image tags from ${TAGS_FILE}..."

          for SERVICE in ${{ env.SERVICES }}; do
            IMAGE_NAME="${{ env.IMAGE_PREFIX }}${SERVICE}"
            TAG=$(grep -A1 "name: ${IMAGE_NAME}" "$TAGS_FILE" | grep 'newTag:' | sed 's/.*newTag: *"\(.*\)"/\1/')
            echo "${SERVICE}_tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "  ${SERVICE}: ${TAG}"
          done

      - name: Promote each service
        run: |
          TARGET="${{ inputs.target_environment }}"
          TAGS_FILE="overlays/${TARGET}/patches/image-tags.yaml"

          for SERVICE in ${{ env.SERVICES }}; do
            IMAGE_NAME="${{ env.IMAGE_PREFIX }}${SERVICE}"

            # Read the tag from step outputs
            case "$SERVICE" in
              ui)       TAG="${{ steps.read-tags.outputs.ui_tag }}" ;;
              catalog)  TAG="${{ steps.read-tags.outputs.catalog_tag }}" ;;
              cart)     TAG="${{ steps.read-tags.outputs.cart_tag }}" ;;
              orders)   TAG="${{ steps.read-tags.outputs.orders_tag }}" ;;
              checkout) TAG="${{ steps.read-tags.outputs.checkout_tag }}" ;;
            esac

            echo "Promoting ${SERVICE} to ${TARGET} with tag ${TAG}..."

            # Update the image tag in the target overlay
            sed -i "/${IMAGE_NAME}/{n;s/newTag: \".*\"/newTag: \"${TAG}\"/}" "$TAGS_FILE"
          done

          echo "--- Updated ${TAGS_FILE} ---"
          cat "$TAGS_FILE"

      - name: Append to promotion history
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SOURCE="${{ inputs.source_environment }}"
          TARGET="${{ inputs.target_environment }}"
          ACTOR="${{ github.actor }}"

          # Build the promotion entry using printf to avoid heredoc YAML conflicts
          printf '\n  - timestamp: "%s"\n    source: %s\n    target: %s\n    initiatedBy: %s\n    services:\n      - name: ui\n        imageTag: "%s"\n      - name: catalog\n        imageTag: "%s"\n      - name: cart\n        imageTag: "%s"\n      - name: orders\n        imageTag: "%s"\n      - name: checkout\n        imageTag: "%s"\n' \
            "$TIMESTAMP" "$SOURCE" "$TARGET" "$ACTOR" \
            "${{ steps.read-tags.outputs.ui_tag }}" \
            "${{ steps.read-tags.outputs.catalog_tag }}" \
            "${{ steps.read-tags.outputs.cart_tag }}" \
            "${{ steps.read-tags.outputs.orders_tag }}" \
            "${{ steps.read-tags.outputs.checkout_tag }}" \
            >> promotion-history.yaml

      - name: Commit and push (staging - direct commit)
        if: inputs.target_environment == 'staging'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "overlays/${{ inputs.target_environment }}/patches/image-tags.yaml" promotion-history.yaml
          git commit -m "promote-env(${{ inputs.source_environment }} → ${{ inputs.target_environment }}): all services"
          git push

      - name: Create PR (production)
        if: inputs.target_environment == 'production'
        run: |
          BRANCH="promote-env/${{ inputs.source_environment }}-to-${{ inputs.target_environment }}-$(date +%s)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "overlays/${{ inputs.target_environment }}/patches/image-tags.yaml" promotion-history.yaml
          git commit -m "promote-env(${{ inputs.source_environment }} → ${{ inputs.target_environment }}): all services"
          git push --set-upstream origin "$BRANCH"

          gh pr create \
            --title "Promote all services: ${{ inputs.source_environment }} → ${{ inputs.target_environment }}" \
            --body "## Environment Promotion

          | Field | Value |
          |-------|-------|
          | **Source** | ${{ inputs.source_environment }} |
          | **Target** | ${{ inputs.target_environment }} |
          | **Triggered By** | @${{ github.actor }} |

          ### Service Image Tags
          | Service | Image Tag |
          |---------|-----------|
          | ui | \`${{ steps.read-tags.outputs.ui_tag }}\` |
          | catalog | \`${{ steps.read-tags.outputs.catalog_tag }}\` |
          | cart | \`${{ steps.read-tags.outputs.cart_tag }}\` |
          | orders | \`${{ steps.read-tags.outputs.orders_tag }}\` |
          | checkout | \`${{ steps.read-tags.outputs.checkout_tag }}\` |" \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write workflow run summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Environment Promotion Summary

          | Field | Value |
          |-------|-------|
          | **Source Environment** | \`${{ inputs.source_environment }}\` |
          | **Target Environment** | \`${{ inputs.target_environment }}\` |
          | **Method** | ${{ inputs.target_environment == 'production' && 'Pull request' || 'Direct commit' }} |
          | **Triggered By** | @${{ github.actor }} |

          ### Promoted Service Tags
          | Service | Image Tag |
          |---------|-----------|
          | ui | \`${{ steps.read-tags.outputs.ui_tag }}\` |
          | catalog | \`${{ steps.read-tags.outputs.catalog_tag }}\` |
          | cart | \`${{ steps.read-tags.outputs.cart_tag }}\` |
          | orders | \`${{ steps.read-tags.outputs.orders_tag }}\` |
          | checkout | \`${{ steps.read-tags.outputs.checkout_tag }}\` |
          EOF
