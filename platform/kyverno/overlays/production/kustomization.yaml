apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Production environment: all policies enforced, audit policies promoted to enforce.
patches:
  # Promote require-labels from audit to enforce
  - target:
      kind: ClusterPolicy
      name: require-labels
    patch: |
      - op: replace
        path: /spec/validationFailureAction
        value: Enforce

  # Promote require-probes from audit to enforce
  - target:
      kind: ClusterPolicy
      name: require-probes
    patch: |
      - op: replace
        path: /spec/validationFailureAction
        value: Enforce
