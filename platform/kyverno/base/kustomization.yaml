apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Kyverno Helm chart is deployed via the platform-components ApplicationSet.
# This kustomization layers ClusterPolicy resources on top of the Helm chart installation.
helmCharts:
  - name: kyverno
    repo: https://kyverno.github.io/kyverno/
    version: "3.4.0"
    releaseName: kyverno
    namespace: kyverno
    includeCRDs: true

resources:
  - policies/require-approved-registries.yaml
  - policies/require-resource-limits.yaml
  - policies/require-labels.yaml
  - policies/disallow-privileged.yaml
  - policies/require-probes.yaml
