apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# kube-prometheus-stack Helm chart — deployed to each spoke cluster via platform-components ApplicationSet.
# Provides Prometheus for metrics collection and alerting across the platform.
# Requirements: 18.1, 18.2, 18.3, 18.4, 18.10
helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: "72.6.0"
    releaseName: kube-prometheus-stack
    namespace: monitoring
    includeCRDs: true
    valuesInline:
      # Disable Grafana from the stack — we deploy Grafana separately
      grafana:
        enabled: false
      prometheus:
        prometheusSpec:
          # Base retention and scrape interval — overridden per environment
          retention: 24h
          scrapeInterval: 30s
          serviceMonitorSelectorNilUsesHelmValues: false
          podMonitorSelectorNilUsesHelmValues: false
      # Enable Prometheus Operator ServiceMonitor CRDs
      prometheusOperator:
        enabled: true

resources:
  - servicemonitor-retail-store.yaml
  - servicemonitor-argocd.yaml
  - servicemonitor-argo-rollouts.yaml
  - servicemonitor-kyverno.yaml
