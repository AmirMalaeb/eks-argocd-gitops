apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Production environment: long retention (30d), tight scrape interval (15s)
# Requirements: 18.12
patches:
  - target:
      kind: HelmChartInflationGenerator
      name: kube-prometheus-stack
    patch: |
      - op: replace
        path: /valuesInline/prometheus/prometheusSpec/retention
        value: 30d
      - op: replace
        path: /valuesInline/prometheus/prometheusSpec/scrapeInterval
        value: 15s
      - op: add
        path: /valuesInline/prometheus/prometheusSpec/resources
        value:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 4Gi
