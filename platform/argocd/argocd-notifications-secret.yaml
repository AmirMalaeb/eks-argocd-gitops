# Argo CD Notifications Secret — Slack webhook credentials
# IMPORTANT: This file is a TEMPLATE. Do NOT commit real credentials.
# The actual Slack token/webhook URL must be injected at deploy time via:
#   - kubectl create secret (manual)
#   - External Secrets Operator (preferred — see platform/external-secrets/)
#   - Sealed Secrets
#
# The argocd-notifications-cm references $slack-token which resolves to
# the 'slack-token' key in this Secret.
#
# Requirements: 9.4
apiVersion: v1
kind: Secret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
type: Opaque
stringData:
  # Replace with your Slack Bot Token or Incoming Webhook URL
  # For Slack Bot Token: xoxb-xxxxxxxxxxxx-xxxxxxxxxxxx-xxxxxxxxxxxxxxxxxxxxxxxx
  # For Incoming Webhook: https://hooks.slack.com/services/T.../B.../...
  slack-token: <replace-with-slack-token>
