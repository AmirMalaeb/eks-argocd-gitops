apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Staging environment: moderate resource limits for Grafana
# Requirements: 18.12
patches:
  - target:
      kind: HelmChartInflationGenerator
      name: grafana
    patch: |
      - op: add
        path: /valuesInline/resources
        value:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
