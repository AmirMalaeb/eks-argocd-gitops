apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Kyverno ClusterPolicies — deployed separately from the Kyverno engine.
# The Kyverno controller is installed via Helm in the platform-components ApplicationSet.
# These policies are applied as plain Kubernetes manifests via this Kustomize source.
resources:
  - require-approved-registries.yaml
  - require-resource-limits.yaml
  - require-labels.yaml
  - disallow-privileged.yaml
  - require-probes.yaml
