apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: retail-store-db-credentials
  namespace: retail-store
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: db-credentials
  data:
    - secretKey: mariadb-password
      remoteRef:
        key: dev/retail-store/mariadb
        property: password
    - secretKey: redis-password
      remoteRef:
        key: dev/retail-store/redis
        property: password
