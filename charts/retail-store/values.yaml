# ---------------------------------------------------------------------------
# Checkout Service (Node.js) — persistence: Redis
# ---------------------------------------------------------------------------
checkout:
  image:
    repository: public.ecr.aws/aws-containers/retail-store-sample-checkout
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 128m
      memory: 128Mi
    limits:
      cpu: 256m
      memory: 256Mi
  livenessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  serviceMonitor:
    enabled: true
    path: /metrics
    interval: 30s
  persistence:
    type: redis
    redis:
      enabled: true
      image:
        repository: redis
        tag: "7-alpine"
      port: 6379
      existingSecret: checkout-redis-credentials
      resources:
        requests:
          cpu: 64m
          memory: 128Mi
        limits:
          cpu: 128m
          memory: 256Mi
