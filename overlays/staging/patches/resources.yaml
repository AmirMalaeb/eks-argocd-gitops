# Staging environment: moderate resource limits (cpu 128m-256m, memory 256Mi-512Mi)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-store-ui
spec:
  template:
    spec:
      containers:
        - name: ui
          resources:
            requests:
              cpu: 256m
              memory: 512Mi
            limits:
              cpu: 512m
              memory: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-store-catalog
spec:
  template:
    spec:
      containers:
        - name: catalog
          resources:
            requests:
              cpu: 128m
              memory: 256Mi
            limits:
              cpu: 256m
              memory: 512Mi
---
apiVersion: apps/v1
