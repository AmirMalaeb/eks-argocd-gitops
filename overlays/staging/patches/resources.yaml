            limits:
              cpu: 512m
              memory: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-store-orders
spec:
  template:
    spec:
      containers:
        - name: orders
          resources:
            requests:
              cpu: 256m
