apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base resources are generated by the Helm+Kustomize CMP plugin.
# The CMP renders `helm template` output into this overlay directory
# before running `kustomize build`.

patchesStrategicMerge:
  - patches/replicas.yaml
  - patches/resources.yaml
  - patches/ingress.yaml
  - patches/persistence.yaml

# Image tag overrides for dev environment
images:
  - name: public.ecr.aws/aws-containers/retail-store-sample-ui
    newTag: "1.0.0"
  - name: public.ecr.aws/aws-containers/retail-store-sample-catalog
    newTag: "1.0.0"
  - name: public.ecr.aws/aws-containers/retail-store-sample-cart
    newTag: "1.0.0"
  - name: public.ecr.aws/aws-containers/retail-store-sample-orders
    newTag: "1.0.0"
  - name: public.ecr.aws/aws-containers/retail-store-sample-checkout
    newTag: "1.0.0"
