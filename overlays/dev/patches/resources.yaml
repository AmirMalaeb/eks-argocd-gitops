# Dev environment: minimal resource limits (cpu 64m-128m, memory 128Mi-256Mi)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-store-ui
spec:
  template:
    spec:
      containers:
        - name: ui
          resources:
            requests:
              cpu: 128m
              memory: 256Mi
            limits:
              cpu: 256m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-store-catalog
spec:
  template:
    spec:
      containers:
        - name: catalog
          resources:
            requests:
              cpu: 64m
              memory: 128Mi
            limits:
              cpu: 128m
              memory: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-store-cart
spec:
  template:
    spec:
      containers:
        - name: cart
          resources:
            requests:
              cpu: 128m
              memory: 256Mi
            limits:
              cpu: 256m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-store-orders
spec:
  template:
    spec:
      containers:
        - name: orders
          resources:
            requests:
              cpu: 128m
              memory: 256Mi
            limits:
              cpu: 256m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-store-checkout
spec:
  template:
    spec:
      containers:
        - name: checkout
          resources:
            requests:
              cpu: 64m
              memory: 128Mi
            limits:
              cpu: 128m
              memory: 256Mi
