# Retail Store ApplicationSet — generates one Argo CD Application per
# cluster-environment combination using a matrix of Git + Cluster generators.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: retail-store
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/AmirMalaeb/eks-argocd-gitops.git
              revision: HEAD
              directories:
                - path: overlays/*
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
  template:
    metadata:
      name: 'retail-store-{{path.basename}}-{{name}}'
    spec:
      project: retail-store
      source:
        repoURL: https://github.com/AmirMalaeb/eks-argocd-gitops.git
        targetRevision: HEAD
        path: '{{path}}'
        plugin:
          name: helm-kustomize
      destination:
        server: '{{server}}'
        namespace: 'retail-store-{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
