# Retail Store ApplicationSet — deploys the AWS Retail Store Sample App
# using the upstream OCI Helm chart from public ECR.
# Managed Argo CD doesn't support CMP, so we use native Helm source.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: retail-store
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - environment: dev
            cluster: spoke-dev
            replicas: "1"
          - environment: staging
            cluster: spoke-staging
            replicas: "2"
          - environment: production
            cluster: spoke-prod
            replicas: "3"
  template:
    metadata:
      name: 'retail-store-{{environment}}'
    spec:
      project: default
      source:
        repoURL: public.ecr.aws/aws-containers
        chart: retail-store-sample-app
        targetRevision: 1.0.0
        helm:
          releaseName: retail-store
          parameters:
            - name: ui.replicas
              value: '{{replicas}}'
      destination:
        name: '{{cluster}}'
        namespace: 'retail-store-{{environment}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
