# Retail Store ApplicationSet — deploys each service of the AWS Retail Store
# Sample App using individual OCI Helm charts from public ECR.
# Managed Argo CD has direct ECR integration — the Capability Role needs
# AmazonEC2ContainerRegistryPullOnly and AmazonElasticContainerRegistryPublicReadOnly policies.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: retail-store
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - service: ui
                  chart: retail-store-sample-ui-chart
                - service: catalog
                  chart: retail-store-sample-catalog-chart
                - service: cart
                  chart: retail-store-sample-cart-chart
                - service: checkout
                  chart: retail-store-sample-checkout-chart
                - service: orders
                  chart: retail-store-sample-orders-chart
          - list:
              elements:
                - environment: dev
                  cluster: spoke-dev
                - environment: staging
                  cluster: spoke-staging
                - environment: production
                  cluster: spoke-prod
  template:
    metadata:
      name: 'retail-store-{{service}}-{{environment}}'
    spec:
      project: default
      source:
        repoURL: public.ecr.aws/aws-containers
        chart: '{{chart}}'
        targetRevision: 1.3.0
        helm:
          releaseName: '{{service}}'
      destination:
        name: '{{cluster}}'
        namespace: 'retail-store-{{environment}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
