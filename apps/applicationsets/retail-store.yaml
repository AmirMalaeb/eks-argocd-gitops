# Retail Store ApplicationSet — generates one Argo CD Application per environment.
# Uses list generator for explicit 1:1 environment-to-cluster mapping.
# Source type: native Kustomize (CMP is not supported in managed Argo CD).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: retail-store
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - environment: dev
            cluster: spoke-dev
          - environment: staging
            cluster: spoke-staging
          - environment: production
            cluster: spoke-prod
  template:
    metadata:
      name: 'retail-store-{{environment}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/AmirMalaeb/eks-argocd-gitops.git
        targetRevision: HEAD
        path: 'overlays/{{environment}}'
      destination:
        name: '{{cluster}}'
        namespace: 'retail-store-{{environment}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
