# Platform Components ApplicationSet — deploys Kyverno, External Secrets Operator,
# Argo Rollouts, Prometheus, and Grafana to every spoke cluster.
# Uses matrix of list generator (components) × list generator (clusters).
# Source type: native Kustomize (CMP is not supported in managed Argo CD).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-components
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - component: kyverno
                  path: platform/kyverno/base
                - component: external-secrets
                  path: platform/external-secrets/base
                - component: argo-rollouts
                  path: platform/argo-rollouts/base
                - component: prometheus
                  path: platform/prometheus/base
                - component: grafana
                  path: platform/grafana/base
          - list:
              elements:
                - cluster: spoke-dev
                  environment: dev
                - cluster: spoke-staging
                  environment: staging
                - cluster: spoke-prod
                  environment: production
  template:
    metadata:
      name: '{{component}}-{{environment}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/AmirMalaeb/eks-argocd-gitops.git
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        name: '{{cluster}}'
        namespace: '{{component}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
