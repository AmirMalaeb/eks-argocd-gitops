# Platform Components ApplicationSet — deploys Kyverno, External Secrets Operator,
# Argo Rollouts, Prometheus, and Grafana to every spoke cluster.
# Uses Argo CD native Helm source type (not Kustomize helmCharts) since
# managed Argo CD doesn't support kustomize --enable-helm.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-components
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - component: kyverno
                  repoUrl: https://kyverno.github.io/kyverno/
                  chart: kyverno
                  chartVersion: "3.4.0"
                  namespace: kyverno
                - component: external-secrets
                  repoUrl: https://charts.external-secrets.io
                  chart: external-secrets
                  chartVersion: "0.12.1"
                  namespace: external-secrets
                - component: argo-rollouts
                  repoUrl: https://argoproj.github.io/argo-helm
                  chart: argo-rollouts
                  chartVersion: "2.40.5"
                  namespace: argo-rollouts
                - component: prometheus
                  repoUrl: https://prometheus-community.github.io/helm-charts
                  chart: kube-prometheus-stack
                  chartVersion: "77.10.0"
                  namespace: monitoring
                - component: grafana
                  repoUrl: https://grafana.github.io/helm-charts
                  chart: grafana
                  chartVersion: "8.12.0"
                  namespace: monitoring
          - list:
              elements:
                - cluster: spoke-dev
                  environment: dev
                - cluster: spoke-staging
                  environment: staging
                - cluster: spoke-prod
                  environment: production
  template:
    metadata:
      name: '{{component}}-{{environment}}'
    spec:
      project: default
      source:
        repoURL: '{{repoUrl}}'
        chart: '{{chart}}'
        targetRevision: '{{chartVersion}}'
        helm:
          releaseName: '{{component}}'
      destination:
        name: '{{cluster}}'
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
